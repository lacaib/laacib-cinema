<!DOCTYPE html>
<html lang="so">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Laacib Cinema</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;700;900&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#020617;
color:white;
overflow-x:hidden;
}

header{
display:flex;
justify-content:space-between;
align-items:center;
padding:15px 20px;
background:#0f172a;
position:sticky;
top:0;
z-index:999;
}

.logo{
display:flex;
align-items:center;
gap:15px;
}

.logo img{
width:60px;
height:60px;
}

.logo h1{
font-size:32px;
color:gold;
}

.logo p{
opacity:.7;
}

.search-box input{
padding:12px;
border:none;
border-radius:12px;
outline:none;
width:220px;
}

.hero{
height:420px;
background:
linear-gradient(to right,#000000c0,#00000080),
url('https://images.unsplash.com/photo-1489599849927-2ee91cede3ba?q=80&w=1600&auto=format&fit=crop');

background-size:cover;
background-position:center;

display:flex;
justify-content:center;
align-items:center;
text-align:center;
padding:20px;
}

.hero h2{
font-size:70px;
color:gold;
text-shadow:0 0 25px gold;
}

.hero p{
font-size:25px;
margin-top:15px;
}

.container{
padding:40px 25px;
}

.section-title{
font-size:45px;
margin-bottom:25px;
color:gold;
}

.movies-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
gap:25px;
}

.movie-card{
background:#111827;
border-radius:22px;
overflow:hidden;
transition:.4s;
position:relative;
box-shadow:0 0 25px rgba(0,0,0,.4);
}

.movie-card:hover{
transform:translateY(-10px);
}

.movie-image{
position:relative;
}

.movie-image img{
width:100%;
height:380px;
object-fit:cover;
}

.movie-year{
position:absolute;
top:15px;
left:15px;
background:gold;
color:black;
padding:8px 14px;
border-radius:30px;
font-weight:bold;
font-size:15px;
box-shadow:0 0 10px rgba(0,0,0,.4);
}

.movie-info{
padding:20px;
}

.movie-info h3{
font-size:30px;
margin-bottom:10px;
color:gold;
}

.movie-info p{
opacity:.85;
line-height:1.7;
margin-bottom:15px;
}

.rating{
font-size:20px;
color:gold;
margin-bottom:15px;
}

.watch-btn,
.download-btn,
.add-btn,
.delete-btn{
width:100%;
padding:14px;
border:none;
border-radius:12px;
font-size:18px;
font-weight:bold;
cursor:pointer;
margin-top:10px;
}

.watch-btn{
background:#2563eb;
color:white;
}

.download-btn{
background:gold;
color:black;
text-decoration:none;
display:block;
text-align:center;
}

.add-btn{
background:#16a34a;
color:white;
}

.delete-btn{
background:red;
color:white;
}

footer{
background:#0f172a;
padding:25px;
text-align:center;
margin-top:50px;
font-size:22px;
}

.video-modal{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:#000000f0;
justify-content:center;
align-items:center;
padding:20px;
z-index:99999;
}

.video-box{
width:100%;
max-width:900px;
}

.video-box iframe{
width:100%;
height:500px;
border:none;
border-radius:20px;
}

.close-video{
width:100%;
padding:15px;
margin-top:15px;
background:red;
color:white;
border:none;
border-radius:12px;
font-size:18px;
cursor:pointer;
}

.admin-box{
background:#111827;
padding:25px;
border-radius:20px;
margin-bottom:40px;
display:none;
}

.admin-box h2{
margin-bottom:20px;
color:gold;
}

.admin-box input,
.admin-box textarea{
width:100%;
padding:14px;
margin-top:12px;
border:none;
border-radius:12px;
background:#1e293b;
color:white;
}

.admin-box textarea{
height:120px;
resize:none;
}

@media(max-width:700px){

header{
flex-direction:column;
gap:15px;
}

.hero h2{
font-size:50px;
}

.hero p{
font-size:20px;
}

.search-box input{
width:100%;
}

.video-box iframe{
height:250px;
}

}

</style>

</head>

<body>

<header>

<div class="logo">

<img src="https://cdn-icons-png.flaticon.com/512/3418/3418886.png">

<div>

<h1>Laacib Cinema</h1>

<p>Aflaanta Ugu Fiican</p>

</div>

</div>

<div class="search-box">

<input type="text" id="searchInput" placeholder="Raadi Filim...">

</div>

</header>

<section class="hero">

<div>

<h2>Laacib Cinema</h2>

<p>Goobta ugu fiican aflaanta iyo musalsallada</p>

</div>

</section>

<div class="container">

<!-- ADMIN -->

<div class="admin-box" id="adminBox">

<h2>Admin Panel</h2>

<input type="text" id="movieTitle" placeholder="Magaca Filimka">

<textarea id="movieDesc" placeholder="Sharaxaad"></textarea>

<input type="text" id="movieRating" placeholder="Rating ★★★★★">

<input type="text" id="movieYear" placeholder="Taariikhda Soo Saarista">

<input type="text" id="movieImage" placeholder="Link Sawirka">

<input type="text" id="movieVideo" placeholder="Link YouTube">

<input type="text" id="movieDownload" placeholder="Link Download">

<button class="add-btn" onclick="addMovie()">

Ku Dar Filim

</button>

</div>

<h2 class="section-title">

Aflaanta Cusub

</h2>

<div class="movies-grid" id="moviesGrid"></div>

</div>

<footer>

Laacib Cinema © 2026

</footer>

<!-- VIDEO -->

<div class="video-modal" id="videoModal">

<div class="video-box">

<iframe id="videoFrame" allowfullscreen></iframe>

<button class="close-video" onclick="closeVideo()">

Xir

</button>

</div>

</div>

<script>

const ADMIN_PASSWORD =
"IPHONE33@FOYJ45@";

const moviesGrid =
document.getElementById("moviesGrid");

const adminBox =
document.getElementById("adminBox");


// ADMIN LOGIN

if(window.location.hash === "#admin"){

const pass =
prompt("Geli Password-ka Admin");

if(pass === ADMIN_PASSWORD){

adminBox.style.display = "block";

}else{

alert("Password Khaldan");

window.location.href =
"https://lacaib.github.io/laacib-cinema/";

}

}


// STORAGE

let movies = JSON.parse(
localStorage.getItem("movies")
) || [];


// SAVE

function saveMovies(){

localStorage.setItem(
"movies",
JSON.stringify(movies)
);

}


// CONVERT YOUTUBE

function convertYoutube(url){

if(url.includes("watch?v=")){

return url.replace(
"watch?v=",
"embed/"
);

}

if(url.includes("youtu.be/")){

return "https://www.youtube.com/embed/" +
url.split("youtu.be/")[1];

}

return url;

}


// LOAD MOVIES

function loadMovies(){

moviesGrid.innerHTML = "";

movies.forEach((movie,index)=>{

moviesGrid.innerHTML += `

<div class="movie-card">

<div class="movie-image">

<img src="${movie.image}">

<div class="movie-year">

📅 ${movie.year}

</div>

</div>

<div class="movie-info">

<h3>${movie.title}</h3>

<p>${movie.desc}</p>

<div class="rating">

⭐ ${movie.rating}

</div>

<button
class="watch-btn"
onclick="watchMovie('${movie.video}')">

Daawo Filim

</button>

<a
href="${movie.download}"
target="_blank"
class="download-btn">

Download

</a>

${
window.location.hash === "#admin"
?

`
<button
class="delete-btn"
onclick="deleteMovie(${index})">

Tirtir Filim

</button>
`

:

""

}

</div>

</div>

`;

});

}


// ADD MOVIE

window.addMovie = function(){

const title =
document.getElementById("movieTitle").value;

const desc =
document.getElementById("movieDesc").value;

const rating =
document.getElementById("movieRating").value;

const year =
document.getElementById("movieYear").value;

const image =
document.getElementById("movieImage").value;

const video =
convertYoutube(
document.getElementById("movieVideo").value
);

const download =
document.getElementById("movieDownload").value;

if(
!title ||
!image ||
!video
){

alert("Buuxi Xogta");

return;

}

movies.unshift({

title,
desc,
rating,
year,
image,
video,
download

});

saveMovies();

loadMovies();

alert("Filimka Waa La Daray");

document.getElementById("movieTitle").value = "";
document.getElementById("movieDesc").value = "";
document.getElementById("movieRating").value = "";
document.getElementById("movieYear").value = "";
document.getElementById("movieImage").value = "";
document.getElementById("movieVideo").value = "";
document.getElementById("movieDownload").value = "";

};


// DELETE MOVIE

window.deleteMovie = function(index){

const ask =
confirm("Ma Tirtiraysaa Filimkan?");

if(!ask) return;

movies.splice(index,1);

saveMovies();

loadMovies();

alert("Filimka Waa La Tirtiray");

};


// WATCH MOVIE

window.watchMovie = function(link){

document.getElementById(
"videoModal"
).style.display = "flex";

document.getElementById(
"videoFrame"
).src = link;

};


// CLOSE VIDEO

window.closeVideo = function(){

document.getElementById(
"videoModal"
).style.display = "none";

document.getElementById(
"videoFrame"
).src = "";

};


// SEARCH

document
.getElementById("searchInput")
.addEventListener("input",(e)=>{

const value =
e.target.value.toLowerCase();

const cards =
document.querySelectorAll(".movie-card");

cards.forEach(card=>{

const title =
card.querySelector("h3")
.innerText
.toLowerCase();

card.style.display =
title.includes(value)
? "block"
: "none";

});

});


// START

loadMovies();

</script>

</body>
</html>
