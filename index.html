<!DOCTYPE html>
<html lang="so">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Laacib Cinema</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<header>

<div class="logo">

<img src="https://cdn-icons-png.flaticon.com/512/3418/3418886.png">

<div>
<h1>Laacib Cinema</h1>
<p>Aflaanta Ugu Fiican</p>
</div>

</div>

<input type="text" id="searchInput" placeholder="Raadi Filim...">

</header>

<section class="hero">

<h2>Laacib Cinema</h2>

<p>
Goobta ugu fiican aflaanta iyo musalsallada
</p>

</section>

<section class="movies-section">

<h2>Aflaanta Cusub</h2>

<div class="movies-grid" id="moviesGrid"></div>

</section>

<footer>
Laacib Cinema © 2026
</footer>

<!-- ADMIN -->

<div class="admin-panel" id="adminPanel">

<div class="admin-box">

<h2>Admin Panel</h2>

<input type="text" id="movieTitle" placeholder="Magaca Filimka">

<input type="text" id="movieDesc" placeholder="Sharaxaad">

<input type="text" id="movieRating" placeholder="Rating">

<input type="text" id="movieImage" placeholder="Link-ga Sawirka">

<input type="text" id="movieVideo" placeholder="Link-ga YouTube">

<input type="text" id="movieDownload" placeholder="Link-ga Download">

<button onclick="addMovie()" class="add-btn">
Ku Dar Filim
</button>

<button onclick="closeAdmin()" class="close-btn">
Xir
</button>

</div>

</div>

<!-- VIDEO -->

<div class="video-modal" id="videoModal">

<div class="video-box">

<iframe id="videoFrame" allowfullscreen></iframe>

<button onclick="closeVideo()" class="close-video">
Xir
</button>

</div>

</div>

<script type="module" src="app.js"></script>

</body>
</html>
