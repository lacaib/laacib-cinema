<!DOCTYPE html>
<html lang="so">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Laacib Cinema</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:sans-serif;
}

body{
background:#000814;
color:white;
}

header{
background:#001845;
padding:15px;
display:flex;
justify-content:space-between;
align-items:center;
}

.logo{
display:flex;
align-items:center;
gap:10px;
}

.logo img{
width:55px;
height:55px;
object-fit:cover;
}

.logo h1{
color:#ffd60a;
font-size:20px;
}

.logo p{
font-size:14px;
opacity:.7;
}

.search-box input{
padding:10px;
border:none;
border-radius:10px;
outline:none;
}

.hero{
height:300px;
background:url('https://images.unsplash.com/photo-1489599849927-2ee91cede3ba?q=80&w=1200&auto=format&fit=crop') center/cover;
display:flex;
align-items:center;
justify-content:center;
flex-direction:column;
text-align:center;
padding:20px;
}

.hero h2{
font-size:55px;
color:#ffd60a;
text-shadow:0 0 20px #ffd60a;
}

.hero p{
font-size:22px;
background:rgba(0,0,0,.5);
padding:10px;
border-radius:10px;
}

.movies-section{
padding:20px;
}

.movies-section h2{
color:#ffd60a;
margin-bottom:20px;
font-size:40px;
}

.movies-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(230px,1fr));
gap:20px;
}

.movie-card{
background:#001d3d;
border-radius:15px;
overflow:hidden;
transition:.3s;
}

.movie-card:hover{
transform:scale(1.03);
}

.movie-card img{
width:100%;
height:300px;
object-fit:cover;
}

.movie-info{
padding:15px;
}

.movie-info h3{
margin-bottom:10px;
color:#ffd60a;
}

.movie-info p{
opacity:.8;
margin-bottom:10px;
}

.rating{
color:gold;
margin-bottom:10px;
}

.watch-btn,
.download-btn{
display:block;
text-align:center;
padding:10px;
border-radius:10px;
text-decoration:none;
font-weight:bold;
margin-top:10px;
}

.watch-btn{
background:#003566;
color:white;
}

.download-btn{
background:#ffd60a;
color:black;
}

footer{
margin-top:50px;
padding:20px;
text-align:center;
background:#001845;
}

.admin-panel{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,.95);
overflow:auto;
padding:20px;
z-index:999;
}

.admin-box{
background:#001d3d;
padding:20px;
border-radius:20px;
max-width:500px;
margin:auto;
}

.admin-box h2{
margin-bottom:20px;
color:#ffd60a;
}

.admin-box input{
width:100%;
padding:15px;
margin-bottom:15px;
border:none;
border-radius:10px;
outline:none;
}

.admin-box button{
width:100%;
padding:15px;
border:none;
border-radius:10px;
font-size:18px;
font-weight:bold;
cursor:pointer;
margin-top:10px;
}

.add-btn{
background:#003566;
color:white;
}

.close-btn{
background:red;
color:white;
}

.video-modal{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,.95);
justify-content:center;
align-items:center;
z-index:1000;
padding:20px;
}

.video-box{
width:100%;
max-width:900px;
}

.video-box iframe{
width:100%;
height:500px;
border:none;
border-radius:20px;
}

.close-video{
background:red;
color:white;
padding:10px 20px;
border:none;
border-radius:10px;
margin-top:10px;
font-size:18px;
}

@media(max-width:700px){

.hero h2{
font-size:40px;
}

.video-box iframe{
height:250px;
}

}
</style>
</head>

<body>

<header>

<div class="logo">
<img src="https://cdn-icons-png.flaticon.com/512/3418/3418886.png">

<div>
<h1>Laacib Cinema</h1>
<p>Aflaanta Ugu Fiican</p>
</div>
</div>

<div class="search-box">
<input type="text" id="searchInput" placeholder="Raadi Filim...">
</div>

</header>

<section class="hero">
<h2>Laacib Cinema</h2>
<p>Goobta ugu fiican aflaanta iyo musalsallada</p>
</section>

<section class="movies-section">

<h2>Aflaanta Cusub</h2>

<div class="movies-grid" id="moviesGrid"></div>

</section>

<footer>
Laacib Cinema © 2026
</footer>

<!-- ADMIN PANEL -->

<div class="admin-panel" id="adminPanel">

<div class="admin-box">

<h2>Admin Panel</h2>

<input type="text" id="movieTitle" placeholder="Magaca Filimka">

<input type="text" id="movieDesc" placeholder="Sharaxaad">

<input type="text" id="movieRating" placeholder="Rating">

<input type="text" id="movieImage" placeholder="Link-ga Sawirka">

<input type="text" id="movieVideo" placeholder="Link-ga YouTube">

<input type="text" id="movieDownload" placeholder="Link-ga Download">

<button class="add-btn" onclick="addMovie()">
Ku Dar Filim
</button>

<button class="close-btn" onclick="closeAdmin()">
Xir
</button>

</div>

</div>

<!-- VIDEO PLAYER -->

<div class="video-modal" id="videoModal">

<div class="video-box">

<iframe id="videoFrame" allowfullscreen></iframe>

<button class="close-video" onclick="closeVideo()">
Xir
</button>

</div>

</div>

<script type="module">

import {
initializeApp
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getFirestore,
collection,
addDoc,
getDocs
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {

apiKey: "YOUR_API_KEY",

authDomain: "YOUR_AUTH_DOMAIN",

projectId: "YOUR_PROJECT_ID",

storageBucket: "YOUR_STORAGE_BUCKET",

messagingSenderId: "YOUR_SENDER_ID",

appId: "YOUR_APP_ID"

};

const app = initializeApp(firebaseConfig);

const db = getFirestore(app);

const moviesGrid = document.getElementById("moviesGrid");

const ADMIN_PASSWORD = "12345";

function youtubeEmbed(url){

if(url.includes("watch?v=")){
return url.replace("watch?v=","embed/");
}

if(url.includes("youtu.be/")){
return "https://www.youtube.com/embed/" + url.split("youtu.be/")[1];
}

return url;
}

async function addMovie(){

const title = document.getElementById("movieTitle").value;

const desc = document.getElementById("movieDesc").value;

const rating = document.getElementById("movieRating").value;

const image = document.getElementById("movieImage").value;

const video = document.getElementById("movieVideo").value;

const download = document.getElementById("movieDownload").value;

if(!title || !image || !video){

alert("Fadlan Buuxi Xogta");

return;

}

await addDoc(collection(db,"movies"),{

title,
desc,
rating,
image,
video,
download

});

alert("Filimka Waa La Daray");

location.reload();

}

async function loadMovies(){

moviesGrid.innerHTML = "";

const querySnapshot = await getDocs(collection(db,"movies"));

querySnapshot.forEach((doc)=>{

const movie = doc.data();

moviesGrid.innerHTML += `

<div class="movie-card">

<img src="${movie.image}">

<div class="movie-info">

<h3>${movie.title}</h3>

<p>${movie.desc}</p>

<div class="rating">⭐ ${movie.rating}</div>

<a class="watch-btn"
href="#"
onclick="watchMovie('${youtubeEmbed(movie.video)}')">
Daawo Filim
</a>

<a class="download-btn"
href="${movie.download}"
target="_blank">
Download
</a>

</div>

</div>

`;

});

}

window.watchMovie = function(link){

document.getElementById("videoModal").style.display="flex";

document.getElementById("videoFrame").src=link;

}

window.closeVideo = function(){

document.getElementById("videoModal").style.display="none";

document.getElementById("videoFrame").src="";

}

window.closeAdmin = function(){

document.getElementById("adminPanel").style.display="none";

}

const params = new URLSearchParams(window.location.search);

if(params.get("admin")==="true"){

const pass = prompt("Geli Password-ka Admin");

if(pass===ADMIN_PASSWORD){

document.getElementById("adminPanel").style.display="block";

}else{

alert("Password Khaldan");

}

}

window.addMovie = addMovie;

loadMovies();

document.getElementById("searchInput").addEventListener("input",(e)=>{

const value = e.target.value.toLowerCase();

const cards = document.querySelectorAll(".movie-card");

cards.forEach(card=>{

const title = card.querySelector("h3").innerText.toLowerCase();

card.style.display = title.includes(value)
? "block"
: "none";

});

});

</script>

</body>
</html>
