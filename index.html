<!DOCTYPE html>
<html lang="so">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Laacib Cinema</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;900&display=swap" rel="stylesheet">

<link rel="stylesheet" href="style.css">

</head>

<body>

<header>

<div class="logo">

<div class="logo-art">

<div class="camera camera1">🎥</div>

<div class="camera camera2">📽️</div>

<div class="movie-text">
<span>L</span>
<span>A</span>
<span>A</span>
<span>C</span>
<span>I</span>
<span>B</span>
</div>

</div>

<div class="logo-info">

<h1>Laacib Cinema</h1>

<p>Filimaan & Musalsallo</p>

</div>

</div>

<div class="header-right">

<button id="googleBtn">
Gal Google
</button>

<input
type="text"
placeholder="Raadi filim..."
id="searchInput"
class="search-input"
>

</div>

</header>

<section class="hero">

<div class="hero-content">

<h2>Laacib Cinema</h2>

<p>
Goobta ugu fiican filimada iyo musalsallada
</p>

</div>

</section>

<div class="container">

<h2 class="section-title">
Filimaan Cusub
</h2>

<div class="movies-grid" id="moviesGrid">

</div>

</div>

<footer>

Laacib Cinema © 2026

</footer>

<!-- ADMIN PANEL -->

<div id="adminPanel">

<div class="admin-box">

<h2>Admin Panel</h2>

<input
type="text"
id="movieName"
placeholder="Movie Name"
>

<input
type="text"
id="movieActors"
placeholder="Actors"
>

<input
type="text"
id="movieStars"
placeholder="Stars Example 9.8"
>

<label class="upload-label">
Movie Image
</label>

<input
type="file"
id="movieImage"
accept="image/*"
>

<label class="upload-label">
Movie Video
</label>

<input
type="file"
id="movieVideo"
accept="video/*"
>

<textarea
id="movieDesc"
placeholder="Description"
></textarea>

<button
class="add-btn"
onclick="addMovie()"
>
Add Movie
</button>

<button
class="close-btn"
onclick="closeAdmin()"
>
Close
</button>

<h3 class="delete-title">
Delete Movies
</h3>

<div id="deleteMoviesBox">

</div>

</div>

</div>

<script type="module" src="script.js"></script>

</body>
</html>
