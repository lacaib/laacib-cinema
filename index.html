<!DOCTYPE html>
<html lang="so">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Laacib Cinema</title>

<link rel="stylesheet" href="style.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;700;900&display=swap" rel="stylesheet">

</head>

<body>

<header>

<div class="logo">

<div class="logo-art">

<div class="hand hand1"></div>

<div class="camera camera1">🎥</div>

<div class="camera camera2">📽️</div>

<div class="movie-text">
<span>L</span>
<span>A</span>
<span>A</span>
<span>C</span>
<span>I</span>
<span>B</span>
</div>

<div class="hand hand2"></div>

</div>

<div class="logo-info">
<h1>Laacib Cinema</h1>
<p>Filimaan & Musalsallo</p>
</div>

</div>

<div class="google-login">

<button id="googleBtn">

<img src="https://cdn-icons-png.flaticon.com/512/300/300221.png">

<span>Gal Google</span>

</button>

</div>

<div class="search-box">

<input type="text" placeholder="Raadi filim..." id="searchInput">

</div>

</header>

<section class="hero">

<div class="hero-content">

<h2>Laacib Cinema</h2>

<p>Goobta ugu fiican filimada iyo musalsallada</p>

</div>

</section>

<div class="container">

<h2 class="section-title">Filimaan Cusub</h2>

<div class="movies-grid" id="moviesGrid"></div>

</div>

<footer>
Laacib Cinema © 2026
</footer>

<div id="adminPanel">

<div class="admin-box">

<h2>Admin Panel</h2>

<input type="text" id="movieName" placeholder="Movie Name">

<input type="text" id="movieActors" placeholder="Actors">

<input type="text" id="movieStars" placeholder="Stars ★★★★★">

<input type="text" id="movieImage" placeholder="Image URL">

<input type="text" id="movieVideo" placeholder="Video URL">

<textarea id="movieDesc" placeholder="Description"></textarea>

<button class="add-btn" onclick="addMovie()">
Add Movie
</button>

<button class="close-btn" onclick="closeAdmin()">
Close
</button>

</div>

</div>

<script type="module" src="firebase.js"></script>

<script src="script.js"></script>

</body>
</html>
