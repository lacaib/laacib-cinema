<!DOCTYPE html>
<html lang="so">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Laacib Cinema</title>

<link rel="stylesheet" href="style.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;700;900&display=swap" rel="stylesheet">

</head>

<body>

<header>

<div class="logo-box">

<div class="logo-icon">
🎬
</div>

<div>
<h1>Laacib Cinema</h1>
<p>Aflaanta Ugu Fiican</p>
</div>

</div>

<div class="header-buttons">

<button id="googleBtn">
Gal Google
</button>

<a href="https://lacaib.github.io/laacib-cinema/#admin">

<button id="adminBtn">
ADMIN
</button>

</a>

</div>

</header>

<section class="hero">

<div class="hero-content">

<h2>Laacib Cinema</h2>

<p>
Goobta ugu fiican aflaanta iyo musalsallada
</p>

</div>

</section>

<div class="container">

<h2 class="section-title">
Aflaanta Cusub
</h2>

<div class="movies-grid" id="moviesGrid">

</div>

</div>

<!-- ADMIN PANEL -->

<div class="admin-panel" id="adminPanel">

<div class="admin-box">

<h2>
Ku Dar Filim
</h2>

<input type="text" id="movieName" placeholder="Magaca Filimka">

<input type="text" id="movieActors" placeholder="Jilayaasha">

<input type="text" id="movieStars" placeholder="Qiimeynta ★★★★★">

<textarea id="movieDesc" placeholder="Sharaxaad"></textarea>

<input type="file" id="movieImage" accept="image/*">

<input type="text" id="movieVideo" placeholder="Linkiga Video-ga">

<button class="add-btn" onclick="addMovie()">
Ku Dar Filim
</button>

<button class="close-btn" onclick="closeAdmin()">
Xir
</button>

<h2 class="delete-title">
Tirtir Filimada
</h2>

<div id="deleteMoviesBox"></div>

</div>

</div>

<footer>

Laacib Cinema © 2026

</footer>

<script type="module" src="script.js"></script>

</body>
</html>
